name: "Kubernetes Manifest & Chart Validation"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-kustomize:
    name: "Validate Kustomize Manifests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Kubeconform & Setup Kubectl
        run: |
          # Download and install kubeconform
          curl -L -s https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate Dev Overlay Compilation & Schema
        run: |
          # Compile using built-in kubectl kustomize and pipe to kubeconform schema check
          kubectl kustomize kustomize/overlays/dev | kubeconform -summary -strict -ignore-missing-schemas

      - name: Validate Prod Overlay Compilation & Schema
        run: |
          # Compile and validate production overlay
          kubectl kustomize kustomize/overlays/prod | kubeconform -summary -strict -ignore-missing-schemas

  validate-helm:
    name: "Validate Helm Templates"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Run Helm Lint
        run: |
          helm lint helm/app-chart

      - name: Dry Run Template Validation
        run: |
          # Render templates to verify Helm can successfully compile them
          helm template test-release helm/app-chart --strict
