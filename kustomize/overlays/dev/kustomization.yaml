apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: dev-app

# Kustomize ConfigMap generator with environment variables
configMapGenerator:
  - name: app-config
    literals:
      - NODE_ENV=development
      - REACT_APP_API_URL=https://api-dev.react-app.local
      - LOG_LEVEL=debug

# Replicas patch for Dev Environment
replicas:
  - name: react-web-app
    count: 1
