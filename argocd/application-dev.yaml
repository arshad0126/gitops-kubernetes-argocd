apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: react-web-app-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/arshad0126/gitops-kubernetes-argocd.git'
    targetRevision: main
    path: kustomize/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
